version: '3.8'

services:
  # PostgreSQL + pgvector
  postgres:
    image: ankane/pgvector:latest
    container_name: agentflow-db
    environment:
      POSTGRES_USER: agentflow
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentflow123}
      POSTGRES_DB: agentflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: agentflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentflow-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://agentflow:${DB_PASSWORD:-agentflow123}@postgres:5432/agentflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    ports:
      - "3000:3000"

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentflow-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
